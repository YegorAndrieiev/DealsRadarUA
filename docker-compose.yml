services:
  frontend:
    build: ./client
    ports:
      - '3000:3000'
    depends_on:
      - backend
    env_file:
      - ./client/.env
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    environment:
      - CHOKIDAR_USEPOLLING=true
      - API_URL=http://backend:5000/
  backend:
    build: ./server
    ports:
      - '5001:5000'
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
